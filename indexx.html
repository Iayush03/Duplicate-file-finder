<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duplicate File Finder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar">
    <h2>Duplicate Finder</h2>

    <button onclick="scanFiles()">Scan Files</button>
    <button onclick="clearResults()">Clear Results</button>
</div>

<div class="main">

    <div class="topbar">
        <h1>Professional Duplicate File Finder</h1>
    </div>

    <div class="card">
        <h3>Scan Result</h3>

        <table>
            <thead>
                <tr>
                    <th>File Name</th>
                    <th>Size</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="resultBody">
            </tbody>
        </table>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
